version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: shop_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: shop_backend
    restart: always
    env_file:
      - .env
    depends_on:
      - db
    # Запускаем FastAPI
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  bot:
    build: ./backend
    container_name: shop_bot
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - backend
    # Запускаем Бота
    command: python bot.py

  frontend:
    build: ./frontend
    container_name: shop_frontend
    restart: always
    ports:
      - "80:80" # Открываем наружу только этот порт!
    depends_on:
      - backend

volumes:
  pg_data:

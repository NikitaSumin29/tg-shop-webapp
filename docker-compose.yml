version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shop_postgres
    restart: always
    # Подключаем наш файл с секретами! Докер сам возьмет оттуда логин и пароль.
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      # Сохраняем данные БД на жесткий диск, чтобы они не удалялись при перезапуске
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
